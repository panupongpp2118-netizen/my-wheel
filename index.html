<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>วงล้อสุ่มรายชื่อ Pro - Stealth Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            --panel-bg: rgba(255, 255, 255, 0.1);
            --accent: #00cec9;
            --danger: #ff4757;
            --edit: #f1c40f;
        }

        body {
            font-family: 'Prompt', sans-serif;
            background: var(--bg-gradient);
            color: white;
            margin: 0; padding: 10px;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; overflow-x: hidden;
        }

        .header { text-align: center; margin-bottom: 20px; transition: 0.3s; }
        .header.hidden { opacity: 0; pointer-events: none; height: 0; margin: 0; }
        .header h1 { font-size: 1.8rem; margin: 10px 0; text-shadow: 0 0 15px rgba(0, 206, 201, 0.3); }

        .main-layout {
            display: flex; flex-wrap: wrap; justify-content: center;
            gap: 20px; width: 100%; max-width: 1200px;
            transition: all 0.5s ease-in-out;
        }
        .main-layout.centered { max-width: 600px; }

        .wheel-section { flex: 1; display: flex; flex-direction: column; align-items: center; position: relative; min-width: 300px; }
        .canvas-container { position: relative; margin-bottom: 20px; max-width: 100%; }
        
        #canvas { 
            max-width: 100%; height: auto;
            border: 10px solid rgba(255, 255, 255, 0.1); border-radius: 50%; 
            background: white; transition: transform 10s cubic-bezier(0.1, 0, 0, 1);
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        #pointer { 
            position: absolute; top: -15px; left: 50%; transform: translateX(-50%);
            width: 40px; z-index: 10; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.5));
            transform-origin: 50% 15%;
        }

        @keyframes pointer-wiggle {
            0% { transform: translateX(-50%) rotate(0deg); }
            25% { transform: translateX(-50%) rotate(-15deg); }
            100% { transform: translateX(-50%) rotate(0deg); }
        }
        .wiggle { animation: pointer-wiggle 0.1s ease-out; }

        .control-panel { 
            flex: 1; min-width: 300px; background: var(--panel-bg); backdrop-filter: blur(15px);
            border-radius: 25px; padding: 20px; border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.4s ease; overflow: hidden;
        }
        .control-panel.hidden { opacity: 0; flex: 0; min-width: 0; width: 0; padding: 0; margin: 0; border:none; pointer-events: none; height: 0; }

        .input-area { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        .input-group { display: flex; gap: 10px; }
        input[type="text"] { flex: 1; padding: 12px; border-radius: 10px; border: none; font-family: 'Prompt'; font-size: 16px; outline: none; }
        
        button { border: none; cursor: pointer; font-family: 'Prompt'; font-weight: 600; transition: 0.2s; }
        .btn-add { background: var(--accent); color: #1a1a2e; border-radius: 10px; padding: 0 15px; }
        .btn-clear { background: var(--danger); color: white; border-radius: 10px; padding: 8px; font-size: 0.85rem; }
        
        .stealth-hide { transition: 0.2s; }
        .stealth-active .stealth-hide { opacity: 0; width: 0; padding: 0; margin: 0; pointer-events: none; overflow: hidden; }

        .btn-spin { background: #2ecc71; color: white; padding: 15px 40px; font-size: 20px; border-radius: 50px; box-shadow: 0 10px 20px rgba(46, 204, 113, 0.3); margin-top: 10px; }
        .btn-spin:disabled { opacity: 0.3; }

        .names-list { background: rgba(0,0,0,0.2); border-radius: 15px; padding: 5px; max-height: 300px; overflow-y: auto; }
        .name-item { display: flex; align-items: center; padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .name-text { flex: 1; margin-left: 10px; font-size: 1rem; }
        
        .action-btns { display: flex; gap: 5px; }
        .btn-small { padding: 4px 8px; border-radius: 6px; font-size: 0.75rem; color: white; }
        .btn-edit { background: var(--edit); color: #333; }
        .btn-del { background: var(--danger); }

        /* --- ปุ่มฟันเฟือง (จางและเล็กพิเศษ) --- */
        .toggle-menu-btn {
            position: fixed;
            bottom: 15px;
            right: 15px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05); /* จางลงมาก */
            color: rgba(255, 255, 255, 0.2); /* สีไอคอนจางมาก */
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            backdrop-filter: blur(2px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            z-index: 10001; /* ให้อยู่เหนือ Result Modal ด้วย */
            transition: all 0.4s;
            font-size: 18px;
            -webkit-tap-highlight-color: transparent;
        }

        .toggle-menu-btn:hover, .toggle-menu-btn:active {
            background: rgba(255, 255, 255, 0.15);
            color: rgba(255, 255, 255, 0.6);
            transform: scale(1.1);
        }

        @media (max-width: 600px) {
            .toggle-menu-btn {
                width: 35px;
                height: 35px;
                font-size: 16px;
                bottom: 10px;
                right: 10px;
            }
        }

        #resultModal { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.6); display: none; justify-content: center; align-items: center; z-index: 10000; backdrop-filter: blur(10px); }
        .modal-content { background: rgba(255, 255, 255, 0.15); padding: 40px; border-radius: 30px; text-align: center; border: 1px solid rgba(255, 255, 255, 0.2); width: 80%; }
        .winner-name { font-size: 3rem; font-weight: 700; color: var(--accent); margin-bottom: 20px; word-wrap: break-word; }
        .btn-close { background: linear-gradient(90deg, #6c5ce7, #00cec9); color: white; padding: 10px 30px; border-radius: 12px; font-size: 1.1rem; }
    </style>
</head>
<body id="mainBody">

    <div class="header" id="header">
        <h1>วงล้อสุ่มรายชื่อ</h1>
    </div>

    <div class="main-layout" id="layout">
        <div class="wheel-section">
            <div class="canvas-container">
                <svg id="pointer" viewBox="0 0 40 40"><path d="M20 40 L5 10 A15 15 0 1 1 35 10 Z" fill="#ff4757"/></svg>
                <canvas id="canvas" width="500" height="500"></canvas>
            </div>
            <button class="btn-spin" id="spinBtn" onclick="spin()">หมุนลุ้นรางวัล</button>
        </div>

        <div class="control-panel" id="panel">
            <div class="input-area">
                <div class="input-group">
                    <input type="text" id="nameInput" placeholder="เพิ่มชื่อใหม่..." onkeypress="if(event.key==='Enter') addName()">
                    <button class="btn-add" onclick="addName()">เพิ่ม</button>
                </div>
                <button class="btn-clear stealth-hide" onclick="clearAllNames()">ล้างรายชื่อทั้งหมด</button>
            </div>
            <div class="names-list" id="namesUI"></div>
        </div>
    </div>

    <div class="toggle-menu-btn" onclick="toggleMenu()" title="ซ่อน/แสดง เมนู">⚙️</div>

    <div id="resultModal" onclick="this.style.display='none';">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="winner-label">ขอแสดงความยินดีด้วย!</div>
            <div class="winner-name" id="winnerName">...</div>
            <button class="btn-close" onclick="document.getElementById('resultModal').style.display='none';">ปิด</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const pointer = document.getElementById('pointer');
        const spinBtn = document.getElementById('spinBtn');
        const mainBody = document.getElementById('mainBody');
        
        let names = ['ตูน', 'เก๋', 'บอส', 'มีน', 'นนท์', 'ฟ้า'];
        let lockedNames = [];
        let currentRotation = 0;
        let isSpinning = false;
        const colors = ['#e74c3c', '#9b59b6', '#3498db', '#1abc9c', '#2ecc71', '#f1c40f', '#e67e22'];

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function toggleMenu() {
            document.getElementById('panel').classList.toggle('hidden');
            document.getElementById('layout').classList.toggle('centered');
            document.getElementById('header').classList.toggle('hidden');
        }

        window.onkeydown = (e) => {
            if (e.target.tagName === 'INPUT') return;
            if (e.key.toLowerCase() === 'h') toggleMenu();
            if (e.key.toLowerCase() === 'l') mainBody.classList.toggle('stealth-active');
        };

        function addName() {
            const val = document.getElementById('nameInput').value.trim();
            if (val) { names.push(val); document.getElementById('nameInput').value = ''; updateUI(); }
        }

        function deleteName(index) {
            const name = names[index];
            names.splice(index, 1);
            const lockIdx = lockedNames.indexOf(name);
            if (lockIdx > -1) lockedNames.splice(lockIdx, 1);
            updateUI();
        }

        function editName(index) {
            const oldName = names[index];
            const newName = prompt("แก้ไขรายชื่อ:", oldName);
            if (newName && newName.trim() !== "") {
                names[index] = newName.trim();
                const lockIdx = lockedNames.indexOf(oldName);
                if (lockIdx > -1) lockedNames[lockIdx] = newName.trim();
                updateUI();
            }
        }

        function clearAllNames() {
            if (confirm("คุณแน่ใจหรือไม่ว่าต้องการล้างรายชื่อทั้งหมด?")) {
                names = [];
                lockedNames = [];
                updateUI();
            }
        }

        function updateUI() {
            const list = document.getElementById('namesUI');
            list.innerHTML = '';
            names.forEach((n, i) => {
                const isChecked = lockedNames.includes(n) ? 'checked' : '';
                list.innerHTML += `<div class="name-item">
                    <div class="stealth-hide">
                        <input type="checkbox" class="lock-checkbox" ${isChecked} onchange="toggleLock('${n}')">
                    </div>
                    <span class="name-text">${n}</span>
                    <div class="action-btns stealth-hide">
                        <button class="btn-small btn-edit" onclick="editName(${i})">แก้ไข</button>
                        <button class="btn-small btn-del" onclick="deleteName(${i})">ลบ</button>
                    </div>
                </div>`;
            });
            draw();
        }

        function toggleLock(n) {
            const idx = lockedNames.indexOf(n);
            if (idx === -1) lockedNames.push(n); else lockedNames.splice(idx, 1);
        }

        function draw() {
            const arc = (Math.PI * 2) / Math.max(names.length, 1);
            ctx.clearRect(0, 0, 500, 500);
            
            if (names.length === 0) {
                ctx.beginPath(); 
                ctx.fillStyle = "#ccc"; 
                ctx.arc(250, 250, 240, 0, Math.PI * 2); 
                ctx.fill();
                return;
            }

            names.forEach((n, i) => {
                ctx.beginPath(); 
                ctx.fillStyle = colors[i % colors.length]; 
                ctx.moveTo(250, 250);
                ctx.arc(250, 250, 240, i * arc, (i + 1) * arc); 
                ctx.fill();

                ctx.save(); 
                ctx.translate(250, 250); 
                ctx.rotate(i * arc + arc / 2);
                ctx.textAlign = "right"; 
                ctx.fillStyle = "white";

                let fontSize;
                if (names.length <= 5) fontSize = 42;
                else if (names.length <= 10) fontSize = 32;
                else if (names.length <= 20) fontSize = 22;
                else fontSize = 16;

                ctx.font = `bold ${fontSize}px Prompt`;
                ctx.fillText(n, 230, fontSize / 3); 
                ctx.restore();
            });

            ctx.beginPath(); 
            ctx.arc(250, 250, 30, 0, Math.PI * 2); 
            ctx.fillStyle = "white"; 
            ctx.shadowBlur = 15;
            ctx.shadowColor = "rgba(0,0,0,0.2)";
            ctx.fill();
        }

        function playTickSound() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(600, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        }

        function playWinSound() {
            const notes = [523.25, 659.25, 783.99, 1046.50];
            notes.forEach((freq, i) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime + (i * 0.15));
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime + (i * 0.15));
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + (i * 0.15) + 0.5);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(audioCtx.currentTime + (i * 0.15));
                osc.stop(audioCtx.currentTime + (i * 0.15) + 0.5);
            });
        }

        function spin() {
            if (isSpinning || names.length < 2) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            isSpinning = true; spinBtn.disabled = true;

            const arcSize = 360 / names.length;
            let target = lockedNames.length > 0 ? lockedNames[Math.floor(Math.random() * lockedNames.length)] : null;
            let stopAt;

            if (target) {
                const idx = names.indexOf(target);
                const offset = (Math.random() - 0.5) * (arcSize * 0.8);
                stopAt = 270 - (idx * arcSize) - (arcSize / 2) + offset;
            } else {
                stopAt = Math.random() * 360;
            }

            currentRotation += (360 * 15) + ((stopAt - (currentRotation % 360) + 360) % 360);
            canvas.style.transform = `rotate(${currentRotation}deg)`;

            let lastIdx = -1;
            const ticker = setInterval(() => {
                const style = window.getComputedStyle(canvas);
                const matrix = new WebKitCSSMatrix(style.transform);
                const angle = (Math.atan2(matrix.m12, matrix.m11) * 180 / Math.PI);
                const norm = (360 - (angle % 360) + 270) % 360;
                const curIdx = Math.floor(norm / (360/names.length)) % names.length;
                if (curIdx !== lastIdx) {
                    pointer.classList.remove('wiggle'); void pointer.offsetWidth;
                    pointer.classList.add('wiggle'); playTickSound();
                    lastIdx = curIdx;
                }
            }, 20);

            setTimeout(() => {
                clearInterval(ticker);
                isSpinning = false; spinBtn.disabled = false;
                const winnerIdx = Math.floor(((360 - (currentRotation % 360) + 270) % 360) / (360/names.length)) % names.length;
                document.getElementById('winnerName').innerText = names[winnerIdx];
                document.getElementById('resultModal').style.display = 'flex';
                playWinSound();
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, zIndex: 11000 });
            }, 10000);
        }

        updateUI();
    </script>
</body>
</html>
