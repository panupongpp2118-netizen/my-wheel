<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>วงล้อสุ่มรายชื่อ Pro - iPad Optimized</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            --panel-bg: rgba(255, 255, 255, 0.1);
            --accent: #00cec9;
            --danger: #ff4757;
            --edit: #f1c40f;
        }

        * { box-sizing: border-box; touch-action: manipulation; }

        body {
            font-family: 'Prompt', sans-serif;
            background: var(--bg-gradient);
            color: white;
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { font-size: 2.2rem; margin: 0; text-shadow: 0 0 15px rgba(0, 206, 201, 0.3); }

        .main-layout {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 40px;
            width: 100%;
            max-width: 1000px; /* ขยายความกว้างรวม */
        }

        /* ส่วนวงล้อ - ปรับให้ใหญ่ขึ้น */
        .wheel-section { 
            width: 100%; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            position: relative; 
        }

        .canvas-container { 
            position: relative; 
            width: 90vw; /* ใช้หน่วย vw เพื่อให้ใหญ่ตามหน้าจอ */
            max-width: 650px; /* ขนาดสูงสุดสำหรับ iPad/Desktop */
            aspect-ratio: 1/1;
            margin: 0 auto 30px auto;
        }
        
        #canvas { 
            width: 100% !important; 
            height: 100% !important;
            border: 12px solid rgba(255, 255, 255, 0.1); 
            border-radius: 50%; 
            background: white; 
            transition: transform 10s cubic-bezier(0.1, 0, 0, 1);
            box-shadow: 0 0 50px rgba(0,0,0,0.6);
        }

        #pointer { 
            position: absolute; 
            top: -20px; 
            left: 50%; 
            transform: translateX(-50%);
            width: 50px; 
            z-index: 10; 
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.5));
        }

        /* ส่วนควบคุม */
        .control-panel { 
            width: 100%; 
            max-width: 600px; 
            background: var(--panel-bg); 
            backdrop-filter: blur(15px);
            border-radius: 30px; 
            padding: 25px; 
            border: 1px solid rgba(255,255,255,0.1);
        }

        .input-group { display: flex; gap: 10px; margin-bottom: 15px; }
        input[type="text"] { 
            flex: 1; padding: 15px; border-radius: 12px; border: none; 
            font-family: 'Prompt'; font-size: 18px;
        }
        
        .btn-add { background: var(--accent); color: #1a1a2e; border-radius: 12px; padding: 0 25px; font-size: 1.1rem; }
        .btn-clear { background: var(--danger); color: white; border-radius: 10px; padding: 10px; width: 100%; margin-bottom: 15px; font-size: 0.9rem; opacity: 0.8; }
        
        .btn-spin { 
            background: #2ecc71; color: white; padding: 18px 60px; 
            font-size: 24px; border-radius: 60px; 
            box-shadow: 0 10px 25px rgba(46, 204, 113, 0.4);
            width: auto;
            min-width: 280px;
            transition: transform 0.2s;
        }
        .btn-spin:active { transform: scale(0.95); }

        .names-list { 
            background: rgba(0,0,0,0.2); 
            border-radius: 20px; 
            max-height: 300px; 
            overflow-y: auto; 
            margin-top: 10px;
        }
        .name-item { display: flex; align-items: center; padding: 12px 15px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .name-text { flex: 1; margin-left: 15px; font-size: 1.1rem; }
        
        .action-btns { display: flex; gap: 8px; }
        .btn-small { padding: 8px 12px; border-radius: 8px; font-size: 0.8rem; color: white; }
        .btn-edit { background: var(--edit); color: #333; }
        .btn-del { background: var(--danger); }

        /* Modal */
        #resultModal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 1000; padding: 20px; }
        .modal-content { background: #24243e; padding: 50px 30px; border-radius: 40px; text-align: center; width: 100%; max-width: 500px; border: 3px solid var(--accent); }
        .winner-name { font-size: 4rem; font-weight: 700; color: var(--accent); margin: 25px 0; word-wrap: break-word; }
        
        /* ปุ่มลับ */
        .mobile-toggle {
            position: fixed; bottom: 20px; right: 20px; 
            width: 50px; height: 50px; background: rgba(255,255,255,0.1);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 20px; opacity: 0.4; z-index: 2000;
        }

        /* จัดระเบียบสำหรับจอใหญ่/iPad แนวนอน */
        @media (min-width: 1024px) {
            .main-layout { flex-direction: row; align-items: flex-start; gap: 60px; }
            .canvas-container { max-width: 600px; }
            .header h1 { font-size: 3rem; }
        }
    </style>
</head>
<body id="mainBody">

    <div class="header" id="header">
        <h1>วงล้อสุ่มรายชื่อ Pro</h1>
    </div>

    <div class="main-layout" id="layout">
        <div class="wheel-section">
            <div class="canvas-container">
                <svg id="pointer" viewBox="0 0 40 40"><path d="M20 40 L5 10 A15 15 0 1 1 35 10 Z" fill="#ff4757"/></svg>
                <canvas id="canvas" width="500" height="500"></canvas>
            </div>
            <button class="btn-spin" id="spinBtn" onclick="spin()">หมุนวงล้อ</button>
        </div>

        <div class="control-panel" id="panel">
            <div class="input-area">
                <div class="input-group">
                    <input type="text" id="nameInput" placeholder="เพิ่มชื่อที่นี่..." onkeypress="if(event.key==='Enter') addName()">
                    <button class="btn-add" onclick="addName()">เพิ่ม</button>
                </div>
                <button class="btn-clear" onclick="clearAllNames()">ล้างรายชื่อทั้งหมด</button>
            </div>
            <div class="names-list" id="namesUI"></div>
        </div>
    </div>

    <div class="mobile-toggle" onclick="toggleStealthMobile()">⚙️</div>

    <div id="resultModal" onclick="this.style.display='none';">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div style="font-size: 1.5rem;">ยินดีด้วย! ผู้ชนะคือ</div>
            <div class="winner-name" id="winnerName">...</div>
            <button class="btn-add" style="padding: 15px 40px; border-radius: 30px;" onclick="document.getElementById('resultModal').style.display='none';">ปิดหน้าต่าง</button>
        </div>
    </div>

    <script>
        // ใช้ Script เดิมที่คุณให้มาได้เลยครับ (ผมตัดมาเฉพาะส่วน Draw เพื่อความกระชับ)
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const spinBtn = document.getElementById('spinBtn');
        const mainBody = document.getElementById('mainBody');
        
        let names = ['ตูน', 'เก๋', 'บอส', 'มีน', 'นนท์', 'ฟ้า', 'เบียร์', 'ฝน'];
        let lockedNames = [];
        let currentRotation = 0;
        let isSpinning = false;
        const colors = ['#e74c3c', '#9b59b6', '#3498db', '#1abc9c', '#2ecc71', '#f1c40f', '#e67e22', '#34495e'];

        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) audioCtx = new AudioContext();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playTickSound() {
            if(!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.frequency.setValueAtTime(600, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        }

        function addName() {
            const val = document.getElementById('nameInput').value.trim();
            if (val) { names.push(val); document.getElementById('nameInput').value = ''; updateUI(); }
        }

        function deleteName(index) { names.splice(index, 1); updateUI(); }
        
        function editName(index) {
            const newName = prompt("แก้ไขรายชื่อ:", names[index]);
            if (newName) { names[index] = newName.trim(); updateUI(); }
        }

        function clearAllNames() { if (confirm("ล้างรายชื่อทั้งหมด?")) { names = []; updateUI(); } }

        function toggleStealthMobile() {
            const panel = document.getElementById('panel');
            if (panel.style.display === 'none') {
                panel.style.display = 'block';
                document.getElementById('header').style.display = 'block';
            } else {
                panel.style.display = 'none';
                document.getElementById('header').style.display = 'none';
            }
        }

        function updateUI() {
            const list = document.getElementById('namesUI');
            list.innerHTML = '';
            names.forEach((n, i) => {
                list.innerHTML += `<div class="name-item">
                    <span class="name-text">${n}</span>
                    <div class="action-btns">
                        <button class="btn-small btn-edit" onclick="editName(${i})">แก้</button>
                        <button class="btn-small btn-del" onclick="deleteName(${i})">ลบ</button>
                    </div>
                </div>`;
            });
            draw();
        }

        function draw() {
            const arc = (Math.PI * 2) / Math.max(names.length, 1);
            ctx.clearRect(0, 0, 500, 500);
            if (names.length === 0) return;

            names.forEach((n, i) => {
                ctx.beginPath(); 
                ctx.fillStyle = colors[i % colors.length]; 
                ctx.moveTo(250, 250);
                ctx.arc(250, 250, 240, i * arc, (i + 1) * arc); 
                ctx.fill();
                ctx.save(); 
                ctx.translate(250, 250); 
                ctx.rotate(i * arc + arc / 2);
                ctx.textAlign = "right"; ctx.fillStyle = "white";
                let fontSize = names.length <= 10 ? 28 : 16;
                ctx.font = `bold ${fontSize}px Prompt`;
                ctx.fillText(n, 220, fontSize/3); 
                ctx.restore();
            });
            ctx.beginPath(); ctx.arc(250, 250, 20, 0, Math.PI * 2); 
            ctx.fillStyle = "white"; ctx.fill();
        }

        function spin() {
            if (isSpinning || names.length < 2) return;
            initAudio();
            isSpinning = true; spinBtn.disabled = true;
            const stopAt = Math.random() * 360;
            currentRotation += (360 * 8) + stopAt;
            canvas.style.transform = `rotate(${currentRotation}deg)`;

            let lastIdx = -1;
            const ticker = setInterval(() => {
                const style = window.getComputedStyle(canvas);
                const matrix = new WebKitCSSMatrix(style.transform);
                const angle = (Math.atan2(matrix.m12, matrix.m11) * 180 / Math.PI);
                const norm = (360 - (angle % 360) + 270) % 360;
                const curIdx = Math.floor(norm / (360/names.length)) % names.length;
                if (curIdx !== lastIdx) { playTickSound(); lastIdx = curIdx; }
            }, 50);

            setTimeout(() => {
                clearInterval(ticker);
                isSpinning = false; spinBtn.disabled = false;
                const winnerIdx = Math.floor(((360 - (currentRotation % 360) + 270) % 360) / (360/names.length)) % names.length;
                document.getElementById('winnerName').innerText = names[winnerIdx];
                document.getElementById('resultModal').style.display = 'flex';
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            }, 10000);
        }

        updateUI();
    </script>
</body>
</html>
