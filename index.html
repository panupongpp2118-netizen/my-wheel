<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>วงล้อสุ่มรายชื่อ Pro - iPad (With Lock System)</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            --panel-bg: rgba(255, 255, 255, 0.1);
            --accent: #00cec9;
            --danger: #ff4757;
            --edit: #f1c40f;
        }

        * { box-sizing: border-box; touch-action: manipulation; }

        body {
            font-family: 'Prompt', sans-serif;
            background: var(--bg-gradient);
            color: white;
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
        }

        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { font-size: 2.2rem; margin: 0; text-shadow: 0 0 15px rgba(0, 206, 201, 0.3); }

        .main-layout {
            display: flex; flex-direction: column; align-items: center;
            gap: 30px; width: 100%; max-width: 1100px;
        }

        /* ส่วนวงล้อขนาดใหญ่ */
        .wheel-section { width: 100%; display: flex; flex-direction: column; align-items: center; position: relative; }
        .canvas-container { 
            position: relative; 
            width: 85vw; 
            max-width: 600px; 
            aspect-ratio: 1/1;
            margin-bottom: 25px;
        }
        
        #canvas { 
            width: 100% !important; height: 100% !important;
            border: 12px solid rgba(255, 255, 255, 0.1); border-radius: 50%; 
            background: white; transition: transform 10s cubic-bezier(0.1, 0, 0, 1);
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        #pointer { 
            position: absolute; top: -20px; left: 50%; transform: translateX(-50%);
            width: 50px; z-index: 10; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.5));
        }

        .btn-spin { 
            background: #2ecc71; color: white; padding: 18px 60px; 
            font-size: 24px; border-radius: 60px; 
            box-shadow: 0 10px 25px rgba(46, 204, 113, 0.4);
            cursor: pointer;
        }

        /* ส่วนจัดการรายชื่อ */
        .control-panel { 
            width: 100%; max-width: 600px; background: var(--panel-bg); backdrop-filter: blur(15px);
            border-radius: 25px; padding: 20px; border: 1px solid rgba(255,255,255,0.1);
        }

        .input-group { display: flex; gap: 10px; margin-bottom: 15px; }
        input[type="text"] { flex: 1; padding: 15px; border-radius: 12px; border: none; font-size: 18px; font-family: 'Prompt'; }
        
        .btn-add { background: var(--accent); color: #1a1a2e; border-radius: 12px; padding: 0 25px; font-weight: 600; }
        .btn-clear { background: var(--danger); color: white; border-radius: 10px; padding: 8px; width: 100%; margin-bottom: 15px; font-size: 0.8rem; }
        
        .names-list { background: rgba(0,0,0,0.2); border-radius: 15px; max-height: 250px; overflow-y: auto; }
        .name-item { display: flex; align-items: center; padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .name-text { flex: 1; margin-left: 12px; font-size: 1.1rem; }
        
        .lock-checkbox { width: 22px; height: 22px; cursor: pointer; accent-color: var(--accent); }

        .action-btns { display: flex; gap: 8px; }
        .btn-small { padding: 8px 12px; border-radius: 8px; font-size: 0.8rem; color: white; border: none; cursor: pointer; font-family: 'Prompt'; }
        .btn-edit { background: var(--edit); color: #333; }
        .btn-del { background: var(--danger); }

        /* Modal */
        #resultModal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 1000; padding: 20px; }
        .modal-content { background: #24243e; padding: 40px; border-radius: 30px; text-align: center; width: 100%; max-width: 450px; border: 2px solid var(--accent); }
        .winner-name { font-size: 3.5rem; font-weight: 700; color: var(--accent); margin: 25px 0; }

        @media (min-width: 1024px) {
            .main-layout { flex-direction: row; align-items: flex-start; }
            .canvas-container { max-width: 550px; }
        }
    </style>
</head>
<body>

    <div class="header" id="header">
        <h1>วงล้อสุ่มรายชื่อ Pro</h1>
    </div>

    <div class="main-layout">
        <div class="wheel-section">
            <div class="canvas-container">
                <svg id="pointer" viewBox="0 0 40 40"><path d="M20 40 L5 10 A15 15 0 1 1 35 10 Z" fill="#ff4757"/></svg>
                <canvas id="canvas" width="500" height="500"></canvas>
            </div>
            <button class="btn-spin" id="spinBtn" onclick="spin()">เริ่มหมุนลุ้นรางวัล</button>
        </div>

        <div class="control-panel" id="panel">
            <div class="input-group">
                <input type="text" id="nameInput" placeholder="เพิ่มชื่อใหม่..." onkeypress="if(event.key==='Enter') addName()">
                <button class="btn-add" onclick="addName()">เพิ่ม</button>
            </div>
            <button class="btn-clear" onclick="clearAllNames()">ล้างรายชื่อทั้งหมด</button>
            <div class="names-list" id="namesUI"></div>
            <p style="font-size: 0.8rem; color: #888; margin-top: 10px; text-align: center;">💡 ติ๊กถูกหน้าชื่อเพื่อ "ล็อคผล" ให้หยุดที่คนนั้น</p>
        </div>
    </div>

    <div id="resultModal" onclick="this.style.display='none';">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div style="font-size: 1.3rem;">ยินดีด้วย! ผู้ชนะคือ</div>
            <div class="winner-name" id="winnerName">...</div>
            <button class="btn-add" style="padding: 12px 40px; border-radius: 30px;" onclick="document.getElementById('resultModal').style.display='none';">ตกลง</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const spinBtn = document.getElementById('spinBtn');
        
        let names = ['ตูน', 'เก๋', 'บอส', 'มีน', 'นนท์', 'ฟ้า'];
        let lockedNames = []; // ตัวแปรเก็บรายชื่อที่ถูกล็อค
        let currentRotation = 0;
        let isSpinning = false;
        const colors = ['#e74c3c', '#9b59b6', '#3498db', '#1abc9c', '#2ecc71', '#f1c40f', '#e67e22', '#34495e'];

        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) audioCtx = new AudioContext();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playTickSound() {
            if(!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.frequency.setValueAtTime(600, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        }

        function addName() {
            const val = document.getElementById('nameInput').value.trim();
            if (val) { names.push(val); document.getElementById('nameInput').value = ''; updateUI(); }
        }

        function deleteName(index) {
            const name = names[index];
            names.splice(index, 1);
            lockedNames = lockedNames.filter(n => n !== name); // เอารูปล็อคออกด้วยถ้าลบชื่อ
            updateUI();
        }

        function editName(index) {
            const oldName = names[index];
            const newName = prompt("แก้ไขรายชื่อ:", oldName);
            if (newName) {
                names[index] = newName.trim();
                if (lockedNames.includes(oldName)) {
                    lockedNames = lockedNames.map(n => n === oldName ? newName.trim() : n);
                }
                updateUI();
            }
        }

        function toggleLock(name) {
            const idx = lockedNames.indexOf(name);
            if (idx === -1) {
                lockedNames.push(name);
            } else {
                lockedNames.splice(idx, 1);
            }
        }

        function clearAllNames() {
            if (confirm("ล้างรายชื่อทั้งหมด?")) { names = []; lockedNames = []; updateUI(); }
        }

        function updateUI() {
            const list = document.getElementById('namesUI');
            list.innerHTML = '';
            names.forEach((n, i) => {
                const isChecked = lockedNames.includes(n) ? 'checked' : '';
                list.innerHTML += `<div class="name-item">
                    <input type="checkbox" class="lock-checkbox" ${isChecked} onchange="toggleLock('${n}')">
                    <span class="name-text">${n}</span>
                    <div class="action-btns">
                        <button class="btn-small btn-edit" onclick="editName(${i})">แก้</button>
                        <button class="btn-small btn-del" onclick="deleteName(${i})">ลบ</button>
                    </div>
                </div>`;
            });
            draw();
        }

        function draw() {
            const arc = (Math.PI * 2) / Math.max(names.length, 1);
            ctx.clearRect(0, 0, 500, 500);
            if (names.length === 0) return;

            names.forEach((n, i) => {
                ctx.beginPath(); 
                ctx.fillStyle = colors[i % colors.length]; 
                ctx.moveTo(250, 250);
                ctx.arc(250, 250, 240, i * arc, (i + 1) * arc); 
                ctx.fill();
                ctx.save(); 
                ctx.translate(250, 250); 
                ctx.rotate(i * arc + arc / 2);
                ctx.textAlign = "right"; ctx.fillStyle = "white";
                let fontSize = names.length <= 10 ? 28 : 16;
                ctx.font = `bold ${fontSize}px Prompt`;
                ctx.fillText(n, 220, fontSize/3); 
                ctx.restore();
            });
            ctx.beginPath(); ctx.arc(250, 250, 20, 0, Math.PI * 2); 
            ctx.fillStyle = "white"; ctx.fill();
        }

        function spin() {
            if (isSpinning || names.length < 2) return;
            initAudio();
            isSpinning = true; spinBtn.disabled = true;

            const arcSize = 360 / names.length;
            let stopAt;

            // ตรวจสอบว่ามีการล็อคผลไว้หรือไม่
            if (lockedNames.length > 0) {
                // สุ่มเลือกหนึ่งในรายชื่อที่ถูกล็อค
                const targetName = lockedNames[Math.floor(Math.random() * lockedNames.length)];
                const idx = names.indexOf(targetName);
                // คำนวณองศาให้เข็มชี้ไปที่ช่องของชื่อนั้นพอดี
                stopAt = 270 - (idx * arcSize) - (arcSize / 2);
            } else {
                stopAt = Math.random() * 360;
            }

            currentRotation += (360 * 10) + ((stopAt - (currentRotation % 360) + 360) % 360);
            canvas.style.transform = `rotate(${currentRotation}deg)`;

            let lastIdx = -1;
            const ticker = setInterval(() => {
                const style = window.getComputedStyle(canvas);
                const matrix = new WebKitCSSMatrix(style.transform);
                const angle = (Math.atan2(matrix.m12, matrix.m11) * 180 / Math.PI);
                const norm = (360 - (angle % 360) + 270) % 360;
                const curIdx = Math.floor(norm / (360/names.length)) % names.length;
                if (curIdx !== lastIdx) { playTickSound(); lastIdx = curIdx; }
            }, 50);

            setTimeout(() => {
                clearInterval(ticker);
                isSpinning = false; spinBtn.disabled = false;
                const winnerIdx = Math.floor(((360 - (currentRotation % 360) + 270) % 360) / (360/names.length)) % names.length;
                document.getElementById('winnerName').innerText = names[winnerIdx];
                document.getElementById('resultModal').style.display = 'flex';
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            }, 10000);
        }

        updateUI();
    </script>
</body>
</html>
