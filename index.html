<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>วงล้อสุ่มรายชื่อ Pro - Mobile Ready</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            --panel-bg: rgba(255, 255, 255, 0.1);
            --accent: #00cec9;
            --danger: #ff4757;
            --edit: #f1c40f;
        }

        * { box-sizing: border-box; touch-action: manipulation; }

        body {
            font-family: 'Prompt', sans-serif;
            background: var(--bg-gradient);
            color: white;
            margin: 0; padding: 15px;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
        }

        .header { text-align: center; margin-bottom: 20px; transition: 0.3s; }
        .header.hidden { display: none; }
        .header h1 { font-size: 1.8rem; margin: 0; text-shadow: 0 0 15px rgba(0, 206, 201, 0.3); }

        .main-layout {
            display: flex; flex-direction: column; align-items: center;
            gap: 20px; width: 100%; max-width: 1200px;
        }

        /* ปรับปรุงขนาดวงล้อให้ Responsive */
        .wheel-section { width: 100%; display: flex; flex-direction: column; align-items: center; position: relative; }
        .canvas-container { 
            position: relative; 
            width: 100%; 
            max-width: 450px; /* ขนาดสูงสุดในคอม */
            aspect-ratio: 1/1;
            margin-bottom: 20px;
        }
        
        #canvas { 
            width: 100% !important; height: auto !important;
            border: 10px solid rgba(255, 255, 255, 0.1); border-radius: 50%; 
            background: white; transition: transform 10s cubic-bezier(0.1, 0, 0, 1);
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        #pointer { 
            position: absolute; top: -15px; left: 50%; transform: translateX(-50%);
            width: 40px; z-index: 10; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.5));
        }

        .control-panel { 
            width: 100%; max-width: 500px; background: var(--panel-bg); backdrop-filter: blur(15px);
            border-radius: 25px; padding: 20px; border: 1px solid rgba(255,255,255,0.1);
        }
        .control-panel.hidden { display: none; }

        .input-group { display: flex; gap: 8px; margin-bottom: 15px; }
        input[type="text"] { 
            flex: 1; padding: 12px; border-radius: 10px; border: none; 
            font-family: 'Prompt'; font-size: 16px; /* 16px ป้องกัน iOS Zoom */
        }
        
        button { border: none; cursor: pointer; font-family: 'Prompt'; font-weight: 600; }
        .btn-add { background: var(--accent); color: #1a1a2e; border-radius: 10px; padding: 0 20px; }
        .btn-clear { background: var(--danger); color: white; border-radius: 10px; padding: 8px; width: 100%; margin-bottom: 15px; font-size: 0.8rem; }
        
        .btn-spin { 
            background: #2ecc71; color: white; padding: 15px 40px; 
            font-size: 20px; border-radius: 50px; 
            box-shadow: 0 10px 20px rgba(46, 204, 113, 0.3);
            width: 80%; max-width: 300px;
        }

        .names-list { background: rgba(0,0,0,0.2); border-radius: 15px; max-height: 250px; overflow-y: auto; }
        .name-item { display: flex; align-items: center; padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .name-text { flex: 1; margin-left: 10px; font-size: 1rem; overflow: hidden; text-overflow: ellipsis; }
        
        .action-btns { display: flex; gap: 5px; }
        .btn-small { padding: 5px 8px; border-radius: 5px; font-size: 0.7rem; color: white; }
        .btn-edit { background: var(--edit); color: #333; }
        .btn-del { background: var(--danger); }

        /* Stealth Mode Classes */
        .stealth-hide { transition: 0.2s; }
        .stealth-active .stealth-hide { display: none !important; }

        /* Modal ปรับขนาดให้เหมาะกับมือถือ */
        #resultModal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 1000; padding: 20px; }
        .modal-content { background: #24243e; padding: 40px 20px; border-radius: 30px; text-align: center; width: 100%; max-width: 400px; border: 2px solid var(--accent); }
        .winner-name { font-size: 3rem; font-weight: 700; color: var(--accent); margin: 20px 0; word-wrap: break-word; }
        
        /* ปุ่มลับสลับโหมดสำหรับมือถือ */
        .mobile-toggle {
            position: fixed; bottom: 10px; right: 10px; 
            width: 40px; height: 40px; background: rgba(255,255,255,0.1);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 12px; opacity: 0.5; z-index: 2000;
        }

        @media (min-width: 768px) {
            .main-layout { flex-direction: row; align-items: flex-start; }
            .header h1 { font-size: 2.5rem; }
            .control-panel { flex: 1; }
            .wheel-section { flex: 1.2; }
        }
    </style>
</head>
<body id="mainBody">

    <div class="header" id="header">
        <h1>วงล้อสุ่มรายชื่อ</h1>
    </div>

    <div class="main-layout" id="layout">
        <div class="wheel-section">
            <div class="canvas-container">
                <svg id="pointer" viewBox="0 0 40 40"><path d="M20 40 L5 10 A15 15 0 1 1 35 10 Z" fill="#ff4757"/></svg>
                <canvas id="canvas" width="500" height="500"></canvas>
            </div>
            <button class="btn-spin" id="spinBtn" onclick="spin()">หมุนลุ้นรางวัล</button>
        </div>

        <div class="control-panel" id="panel">
            <div class="input-area">
                <div class="input-group">
                    <input type="text" id="nameInput" placeholder="เพิ่มชื่อใหม่..." onkeypress="if(event.key==='Enter') addName()">
                    <button class="btn-add" onclick="addName()">เพิ่ม</button>
                </div>
                <button class="btn-clear stealth-hide" onclick="clearAllNames()">ล้างรายชื่อทั้งหมด</button>
            </div>
            <div class="names-list" id="namesUI"></div>
        </div>
    </div>

    <div class="mobile-toggle" onclick="toggleStealthMobile()">⚙️</div>

    <div id="resultModal" onclick="this.style.display='none';">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div style="font-size: 1.2rem;">ยินดีด้วย! ผู้ชนะคือ</div>
            <div class="winner-name" id="winnerName">...</div>
            <button class="btn-add" style="padding: 10px 30px;" onclick="document.getElementById('resultModal').style.display='none';">ตกลง</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const pointer = document.getElementById('pointer');
        const spinBtn = document.getElementById('spinBtn');
        const mainBody = document.getElementById('mainBody');
        
        let names = ['ตูน', 'เก๋', 'บอส', 'มีน', 'นนท์', 'ฟ้า'];
        let lockedNames = [];
        let currentRotation = 0;
        let isSpinning = false;
        const colors = ['#e74c3c', '#9b59b6', '#3498db', '#1abc9c', '#2ecc71', '#f1c40f', '#e67e22'];

        // ปรับปรุง Web Audio สำหรับ Mobile
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) audioCtx = new AudioContext();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playTickSound() {
            if(!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(600, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        }

        function playWinSound() {
            if(!audioCtx) return;
            const notes = [523.25, 659.25, 783.99, 1046.50];
            notes.forEach((freq, i) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime + (i * 0.15));
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime + (i * 0.15));
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + (i * 0.15) + 0.5);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(audioCtx.currentTime + (i * 0.15));
                osc.stop(audioCtx.currentTime + (i * 0.15) + 0.5);
            });
        }

        // คีย์บอร์ดลัด (สำหรับ PC)
        window.onkeydown = (e) => {
            if (e.target.tagName === 'INPUT') return;
            if (e.key.toLowerCase() === 'h') togglePanel();
            if (e.key.toLowerCase() === 'l') toggleStealth();
        };

        function togglePanel() {
            document.getElementById('panel').classList.toggle('hidden');
            document.getElementById('header').classList.toggle('hidden');
        }

        function toggleStealth() {
            mainBody.classList.toggle('stealth-active');
        }

        function toggleStealthMobile() {
            // โหมดมือถือ: กดหนึ่งครั้งซ่อนปุ่มแก้, กดอีกครั้งซ่อนพาเนลทั้งหมด
            if (!mainBody.classList.contains('stealth-active')) {
                toggleStealth();
            } else {
                toggleStealth();
                togglePanel();
            }
        }

        function addName() {
            const val = document.getElementById('nameInput').value.trim();
            if (val) { names.push(val); document.getElementById('nameInput').value = ''; updateUI(); }
        }

        function deleteName(index) {
            names.splice(index, 1);
            updateUI();
        }

        function editName(index) {
            const newName = prompt("แก้ไขรายชื่อ:", names[index]);
            if (newName) { names[index] = newName.trim(); updateUI(); }
        }

        function clearAllNames() {
            if (confirm("ล้างรายชื่อทั้งหมด?")) { names = []; updateUI(); }
        }

        function toggleLock(n) {
            const idx = lockedNames.indexOf(n);
            if (idx === -1) lockedNames.push(n); else lockedNames.splice(idx, 1);
        }

        function updateUI() {
            const list = document.getElementById('namesUI');
            list.innerHTML = '';
            names.forEach((n, i) => {
                const isChecked = lockedNames.includes(n) ? 'checked' : '';
                list.innerHTML += `<div class="name-item">
                    <div class="stealth-hide">
                        <input type="checkbox" class="lock-checkbox" style="width:20px;height:20px" ${isChecked} onchange="toggleLock('${n}')">
                    </div>
                    <span class="name-text">${n}</span>
                    <div class="action-btns stealth-hide">
                        <button class="btn-small btn-edit" onclick="editName(${i})">แก้</button>
                        <button class="btn-small btn-del" onclick="deleteName(${i})">ลบ</button>
                    </div>
                </div>`;
            });
            draw();
        }

        function draw() {
            const arc = (Math.PI * 2) / Math.max(names.length, 1);
            ctx.clearRect(0, 0, 500, 500);
            
            if (names.length === 0) {
                ctx.beginPath(); ctx.fillStyle = "#ccc"; ctx.arc(250, 250, 240, 0, Math.PI * 2); ctx.fill();
                return;
            }

            names.forEach((n, i) => {
                ctx.beginPath(); 
                ctx.fillStyle = colors[i % colors.length]; 
                ctx.moveTo(250, 250);
                ctx.arc(250, 250, 240, i * arc, (i + 1) * arc); 
                ctx.fill();

                ctx.save(); 
                ctx.translate(250, 250); 
                ctx.rotate(i * arc + arc / 2);
                ctx.textAlign = "right"; ctx.fillStyle = "white";

                let fontSize = names.length <= 10 ? 30 : 18;
                ctx.font = `bold ${fontSize}px Prompt`;
                ctx.fillText(n, 230, fontSize/3); 
                ctx.restore();
            });

            ctx.beginPath(); ctx.arc(250, 250, 25, 0, Math.PI * 2); 
            ctx.fillStyle = "white"; ctx.fill();
        }

        function spin() {
            if (isSpinning || names.length < 2) return;
            initAudio();
            isSpinning = true; spinBtn.disabled = true;

            const arcSize = 360 / names.length;
            let target = lockedNames.length > 0 ? lockedNames[Math.floor(Math.random() * lockedNames.length)] : null;
            let stopAt;

            if (target) {
                const idx = names.indexOf(target);
                stopAt = 270 - (idx * arcSize) - (arcSize / 2);
            } else {
                stopAt = Math.random() * 360;
            }

            currentRotation += (360 * 10) + ((stopAt - (currentRotation % 360) + 360) % 360);
            canvas.style.transform = `rotate(${currentRotation}deg)`;

            let lastIdx = -1;
            const ticker = setInterval(() => {
                const style = window.getComputedStyle(canvas);
                const matrix = new WebKitCSSMatrix(style.transform);
                const angle = (Math.atan2(matrix.m12, matrix.m11) * 180 / Math.PI);
                const norm = (360 - (angle % 360) + 270) % 360;
                const curIdx = Math.floor(norm / (360/names.length)) % names.length;
                if (curIdx !== lastIdx) {
                    playTickSound();
                    lastIdx = curIdx;
                }
            }, 40);

            setTimeout(() => {
                clearInterval(ticker);
                isSpinning = false; spinBtn.disabled = false;
                const winnerIdx = Math.floor(((360 - (currentRotation % 360) + 270) % 360) / (360/names.length)) % names.length;
                document.getElementById('winnerName').innerText = names[winnerIdx];
                document.getElementById('resultModal').style.display = 'flex';
                playWinSound();
                confetti({ particleCount: 100, spread: 50, origin: { y: 0.7 } });
            }, 10000);
        }

        updateUI();
    </script>
</body>
</html>
